    function getRedirectBaseUrl() {
        // Use the current URL as the redirect, which is necessary for GitHub Pages
        const currentUrl = window.location.origin + window.location.pathname;
        return currentUrl.endsWith('/') ? currentUrl : currentUrl + '/';

    // --- UTILITIES ---
    function isUUID(value) {
      const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      return uuidRegex.test(value);
    }

    function timeAgo(dateString) {
      const now = new Date();
      const past = new Date(dateString);
      const diffInSeconds = Math.floor((now - past) / 1000);

      const intervals = [
        { label: 'year', seconds: 31536000 },
        { label: 'month', seconds: 2592000 },
        { label: 'day', seconds: 86400 },
        { label: 'hour', seconds: 3600 },
        { label: 'minute', seconds: 60 },
        { label: 'second', seconds: 1 }
      ];

      for (let i = 0; i < intervals.length; i++) {
        const interval = intervals[i];
        const count = Math.floor(diffInSeconds / interval.seconds);
        if (count >= 1) {
          return `${count} ${interval.label}${count !== 1 ? 's' : ''} ago`;
        }
      }
      return 'just now';
    }

    function showToast(message, type = 'success') {

      toast.textContent = message;
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toastContainer.removeChild(toast), 300);
      }, 3000);
    }

    // --- POST RENDERING ---

    function createPostCard(post) {
      const isUpvoted = post.user_votes?.[0]?.vote_type === 1;
      const card = document.createElement('div');
      card.className = `post-card bg-white p-4 rounded-lg shadow-md mb-4 border ${post.is_sticky ? 'border-yellow-500' : 'border-gray-200'}`;
      card.setAttribute('data-post-id', post.id);

      let categoryBadge = '';
      if (post.community) {
          categoryBadge = `<span class="category-badge bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full mr-2">c/${post.community}</span>`;
      }

      card.innerHTML = `
        <div class="flex">
            <div class="flex flex-col items-center mr-4 upvote-section">
                <button class="vote-button text-gray-400 hover:text-red-500 ${isUpvoted ? 'text-red-500' : ''}" onclick="window.vote('${post.id}', 1)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="${isUpvoted ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                    </svg>
                </button>
                <span class="text-lg font-bold" data-post-votes>${post.vote_count || 0}</span>
            </div>
            <div class="flex-1">
                <div class="flex items-center text-sm text-gray-500 mb-2">
                    ${categoryBadge}
                    <span>Posted by u/${post.user_handle || 'anonymous'}</span>
                    <span class="mx-1">•</span>
                    <span title="${new Date(post.created_at).toLocaleString()}">${timeAgo(post.created_at)}</span>
                </div>
                <h3 class="text-xl font-semibold mb-2" onclick="window.openPostDetail('${post.id}')">${post.title}</h3>
                <p class="text-gray-700 mb-3" onclick="window.openPostDetail('${post.id}')">${post.content.substring(0, 150)}${post.content.length > 150 ? '...' : ''}</p>
                <div class="post-card-footer text-sm text-gray-500">
                    <span onclick="window.openPostDetail('${post.id}')">${post.comment_count || 0} comments</span>
                </div>
            </div>
        </div>
      `;
      return card;
    }

    function renderPosts(posts, append = false) {
        const feed = document.getElementById('post-feed');
        if (!append) {
            feed.innerHTML = '';
        }

        if (posts.length === 0 && !append) {
            feed.innerHTML = '<div class="text-center py-10 text-gray-500">No posts found in this community. Be the first to post!</div>';
            return;
        }

        posts.forEach(post => {
            const card = createPostCard(post);
            feed.appendChild(card);
            postsMap.set(post.id, post); // Update map
        });
    }

    function updatePostCard(postId, updates) {
        const post = postsMap.get(postId);
        if (!post) return;
        Object.assign(post, updates);

        const cardElement = document.querySelector(`[data-post-id="${postId}"]`);
        if (cardElement) {
            // Update vote count
            const voteCountElement = cardElement.querySelector('[data-post-votes]');
            if (voteCountElement) {
                voteCountElement.textContent = post.vote_count || 0;
            }

            // Update upvote button style
            const isUpvoted = post.user_votes?.[0]?.vote_type === 1;
            const voteButton = cardElement.querySelector('.vote-button');
            if (voteButton) {
                voteButton.classList.toggle('text-red-500', isUpvoted);
                voteButton.setAttribute('onclick', `window.vote('${post.id}', 1)`);
            }
        }
    }
    
    // --- LOAD DATA ---

    async function loadPosts(append = false) {
        if (!supabaseClient) return;
        if (isFetchingPosts && append) return; 

        isFetchingPosts = true;
        document.getElementById('loading-indicator').style.display = 'block';

        if (!append) postsOffset = 0;
        
        const filter = (currentCommunity === 'all') ? true : `community.eq.${currentCommunity}`;
        
        const { data: posts, error } = await supabaseClient
            .from('posts')
            .select(`
                *,
                user_votes:post_votes(vote_type),
                vote_count:post_votes_count,
                comment_count:post_comments_count
            `)
            .order('is_sticky', { ascending: false })
            .order('created_at', { ascending: false })
            .limit(POSTS_LIMIT)
            .range(postsOffset, postsOffset + POSTS_LIMIT - 1)
            .eq('community', currentCommunity === 'all' ? undefined : currentCommunity)
            .abortSignal(AbortSignal.timeout(5000)); // Add a timeout for safety

        document.getElementById('loading-indicator').style.display = 'none';
        isFetchingPosts = false;

        if (error && error.code !== '42501') { // Ignore RLS error for loading state
             // 42501 is RLS error, which is expected if policies are not set up
            showToast('Failed to load posts: ' + error.message, 'error');
            // If RLS is the issue, it will hang or return null, not error on network.
            return;
        }
        
        // Log the data to check for RLS blockage
        // console.log("Fetched posts:", posts);

        if (posts) {
            renderPosts(posts, append);
            postsOffset += posts.length;
            if (posts.length < POSTS_LIMIT) {
                // End of list reached
            }
        } else if (!append) {
             // If we get an error or null on initial load, show no posts.
             renderPosts([], false);
        }
    }

    async function loadCommunities() {
        if (!supabaseClient) return;
        const { data: communities, error } = await supabaseClient
            .from('communities')
            .select('name')
            .order('name', { ascending: true });

        if (error) {
            showToast('Failed to load communities: ' + error.message, 'error');
            return;
        }

        const list = document.getElementById('community-list');
        list.innerHTML = `<li id="community-all" class="p-2 cursor-pointer hover:bg-gray-100 font-bold" onclick="selectCommunity('all')">All Communities</li>`;

        if (communities) {
            communities.forEach(c => {
                const li = document.createElement('li');
                li.id = `community-${c.name}`;
                li.className = `p-2 cursor-pointer hover:bg-gray-100 ${memberships.has(c.name) ? 'font-semibold text-blue-600' : ''}`;
                li.textContent = `c/${c.name}`;
                li.onclick = () => selectCommunity(c.name);
                list.appendChild(li);
            });
        }
        selectCommunity(currentCommunity); // Re-select to apply styles
    }

    function selectCommunity(name) {
        currentCommunity = name;
        document.querySelectorAll('#community-list li').forEach(li => {
            li.classList.remove('bg-gray-200');
        });
        document.getElementById(`community-${name}`).classList.add('bg-gray-200');

        // Update the post button community placeholder
        document.getElementById('new-post-community-select').value = name === 'all' ? '' : name;

        // Reset and load new posts
        postsOffset = 0;
        loadPosts(false);
    }
    
    // --- USER INTERACTIONS ---

    async function vote(postId, voteType = 1) {
        if (!supabaseClient || !currentUser) {
            openAuthModal();
            return;
        }
        if (!isUUID(currentUser.id)) return;

        const { error: voteError } = await supabaseClient
            .from('post_votes')
            .upsert({ 
                post_id: postId, 
                user_id: currentUser.id, 
                vote_type: voteType, 
                is_upvote: voteType === 1,
            }, { onConflict: ['post_id', 'user_id'] });

        if (voteError) {
            showToast('Vote failed: ' + voteError.message, 'error');
        } else {
            // Optimistic UI update or full refresh
            const currentPost = postsMap.get(postId);
            if (currentPost) {
                // Simplified optimistic update (requires RLS setup to be reliable)
                // For now, we'll just show a success message and trust the realtime update
                showToast('Vote successful!');
            } else {
                showToast('Vote successful! Refreshing feed...');
                loadPosts(false); // Reload feed to see vote count change
            }
        }
    }

    async function handleNewPost() {
        if (!supabaseClient || !currentUser) {
            openAuthModal();
            return;
        }

        const communityName = document.getElementById('new-post-community-select').value.trim().toLowerCase();
        const title = document.getElementById('new-post-title').value.trim();
        const content = document.getElementById('new-post-content').value.trim();

        if (!communityName) { showToast('Please select a community.', 'error'); return; }
        if (!title || !content) { showToast('Title and content are required.', 'error'); return; }

        // 1. Create the community if it doesn't exist
        const { error: communityError } = await supabaseClient
            .from('communities')
            .upsert({ name: communityName, created_by: currentUser.id }, { onConflict: 'name', ignoreDuplicates: true });

        if (communityError && communityError.code !== '23505') { // 23505 is a unique violation which we can ignore since we are using upsert
             showToast('Failed to create/check community: ' + communityError.message, 'error');
             return;
        }

        // 2. Insert the post
        const { error: postError } = await supabaseClient
            .from('posts')
            .insert({
                community: communityName,
                title: title,
                content: content,
                user_id: currentUser.id,
                user_handle: currentUser.user_metadata.full_name || currentUser.email.split('@')[0]
            });

        if (postError) {
            showToast('Failed to create post: ' + postError.message, 'error');
        } else {
            showToast('Post created successfully!');
            document.getElementById('new-post-title').value = '';
            document.getElementById('new-post-content').value = '';
            // Close the modal if it's open
            if (document.getElementById('new-post-modal-overlay').style.display === 'flex') {
                document.getElementById('new-post-modal-overlay').style.display = 'none';
            }
            // Reload the community list and posts
            loadCommunities();
            loadPosts(false);
        }
    }

        document.getElementById('post-cta-button')?.addEventListener('click', () => {
             document.getElementById('new-post-modal-overlay').style.display = 'flex';
        });

        document.getElementById('new-post-submit')?.addEventListener('click', handleNewPost);
        document.getElementById('new-post-close-btn')?.addEventListener('click', () => {
             document.getElementById('new-post-modal-overlay').style.display = 'none';
        });

        // --- AUTH FLOWS ---

        // Google Login
        document.getElementById('google-login')?.addEventListener('click', async (e) => {
            e.preventDefault();
            if (!supabaseClient) return showToast('Backend not configured', 'error');

            const { error, data } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: getRedirectBaseUrl(),
                    // Use skipBrowserRedirect to force session data into the URL hash,
                    // which bypasses strict browser storage restrictions (best practice for SPAs).
                    skipBrowserRedirect: true, 
                }
            });

            if (error) {
                showToast('Google login failed: ' + error.message, 'error');
            } else if (data.url) {
                // Manual redirect using the URL provided by Supabase
                window.location.href = data.url;
            }
        });
        
        // Email/Password Sign Up
        document.getElementById('signup-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const fullName = document.getElementById('signup-full-name').value;
            
            const { error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName // Store full name in user metadata
                    }
                }
            });

            if (error) {
                showToast('Sign up failed: ' + error.message, 'error');
            } else {
                showToast('Confirmation email sent! Please check your inbox.', 'success');
                // Switch to sign-in tab
                showTab('signin-content');
            }
        });

        // Email/Password Sign In
        document.getElementById('signin-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                showToast('Sign in failed: ' + error.message, 'error');
            }
            // onAuthStateChange handles success
        });
    }

    // --- REALTIME ---
    function subscribeToRealtimePosts() {
        if (!supabaseClient) return;
        if (realtimeChannel) {
             supabaseClient.removeChannel(realtimeChannel);
        }

        realtimeChannel = supabaseClient
            .channel('public:posts')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, payload => {
                // Only show a notification for new posts
                if (currentCommunity === 'all' || payload.new.community === currentCommunity) {
                    showToast(`New post in c/${payload.new.community}: ${payload.new.title}`);
                    // A full reload is safer for a simple app like this
                    loadPosts(false);
                }
            })
             .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'posts' }, payload => {
                // Handle updates to existing posts (e.g., sticky status)
                const postId = payload.new.id;
                const postData = postsMap.get(postId);
                if (postData) {
                    updatePostCard(postId, payload.new);
                }
            })
             .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'post_votes' }, payload => {
                // Realtime updates for votes (requires complex logic for vote count, simpler to reload)
                loadPosts(false); 
            })
            .subscribe((status, err) => {
                 if (status === 'SUBSCRIBED') {
                    // console.log("Subscribed to Realtime Posts");
                 }
                 if (status === 'TIMED_OUT' || status === 'CHANNEL_ERROR') {
                    // console.error("Realtime subscription failed:", err);
                    showToast("Realtime updates unavailable.", 'error');
                 }
            });
    }

    // --- COMMUNITY MEMBERSHIP ---
    async function loadCommunityMemberships() {
      if (!supabaseClient || !currentUser || !isUUID(currentUser.id)) return;
      try {
        const { data, error } = await supabaseClient
          .from('community_members')
          .select('community')
          .eq('user_id', currentUser.id);
        if (!error) {
          (data || []).forEach(r => memberships.add(r.community));
        }
      } catch (_) {}
    }

    async function joinCommunity(name) {
      if (!supabaseClient || !currentUser || !isUUID(currentUser.id)) { memberships.add(name); return; }
      const { error } = await supabaseClient.from('community_members').upsert({ community: name, user_id: currentUser.id });
      if (!error) { memberships.add(name); showToast(`Joined ${name}`); } else { showToast('Failed to join', 'error'); }
    }

    async function leaveCommunity(name) {
      if (!supabaseClient || !currentUser || !isUUID(currentUser.id)) { memberships.delete(name); return; }
      const { error } = await supabaseClient.from('community_members').delete().eq('community', name).eq('user_id', currentUser.id);
      if (!error) { memberships.delete(name); showToast(`Left ${name}`); } else { showToast('Failed to leave', 'error'); }
    }


    // --- INITIALIZATION ---
    async function initializeSupabase() {
        if (!window.supabase || !SUPABASE_URL || !SUPABASE_ANON_KEY) {
            console.warn('Supabase not configured or supabase-js not loaded');
            return;
        }
        
        // 🚨 FIX: Explicitly set auth storage options to use first-party LocalStorage
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                storage: window.localStorage, // Use the origin's LocalStorage explicitly
                autoRefreshToken: true,
                persistSession: true,
            }
        });

        // Auth changes
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            const user = session?.user ?? null;
            if (user) await onUserSignedIn(user);
            else onUserSignedOut();
        });

        // Try to load existing session
        try {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            if (sessionData?.session?.user) await onUserSignedIn(sessionData.session.user);
        } catch (e) {
            console.warn('getSession failed', e);
        }

        // Load posts initially
        await loadPosts();
        loadCommunities();
        subscribeToRealtimePosts();
    }

    // Expose functions used by inline onclick handlers
    window.openPostDetail = (postId) => { showToast(`Opening post detail for: ${postId}`, 'info'); /* Implementation needed */ };
    window.vote = vote;
    window.addComment = (postId) => { showToast(`Adding comment to: ${postId}`, 'info'); /* Implementation needed */ };
    window.joinCommunity = joinCommunity;
    window.leaveCommunity = leaveCommunity;
    window.selectCommunity = selectCommunity;
    window.showTab = showTab;
    
    document.addEventListener('DOMContentLoaded', () => {
        initializeSupabase();
        setupAuthButtons();
        // Load an initial community list before Supabase fully initializes
        loadCommunities();
    });
  </script>
</head>
<body class="bg-gray-100">

<div id="toast-container" class="fixed top-0 right-0 m-4 z-50"></div>

<div id="auth-modal-overlay">
    <div id="auth-modal" class="relative">
        <span class="modal-close-btn" onclick="closeAuthModal()">&times;</span>
        <h2 class="text-2xl font-bold mb-4">Join CampusRepublic</h2>

        <div class="flex mb-4">
            <button id="signin-tab" class="tab-button flex-1 py-2 rounded-l-lg bg-blue-500 text-white font-semibold" onclick="showTab('signin-content')">Sign In</button>
            <button id="signup-tab" class="tab-button flex-1 py-2 rounded-r-lg bg-gray-200 font-semibold" onclick="showTab('signup-content')">Sign Up</button>
        </div>

        <div id="signin-content" class="tab-content active auth-container">
            <button id="google-login" class="auth-button">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/2000px-Google_%22G%22_logo.svg.png" alt="Google Logo">
                Continue with Google
            </button>
            <div class="my-2 text-gray-500">OR</div>
             <form id="signin-form" class="auth-container">
                <input type="email" id="signin-email" placeholder="Email" required class="p-2 border rounded">
                <input type="password" id="signin-password" placeholder="Password" required class="p-2 border rounded">
                <button type="submit" class="p-2 bg-blue-500 text-white rounded font-semibold hover:bg-blue-600">Sign In</button>
            </form>
        </div>

        <div id="signup-content" class="tab-content auth-container">
            <form id="signup-form" class="auth-container">
                <input type="text" id="signup-full-name" placeholder="Full Name (for display)" required class="p-2 border rounded">
                <input type="email" id="signup-email" placeholder="Email" required class="p-2 border rounded">
                <input type="password" id="signup-password" placeholder="Password (min 6 characters)" required class="p-2 border rounded">
                <button type="submit" class="p-2 bg-green-500 text-white rounded font-semibold hover:bg-green-600">Sign Up</button>
            </form>
        </div>
    </div>
</div>

<div id="new-post-modal-overlay" class="fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 z-20 hidden justify-center items-center">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md relative">
        <h3 class="text-xl font-bold mb-4">Create New Post</h3>
        <span id="new-post-close-btn" class="modal-close-btn text-gray-400 hover:text-gray-700">&times;</span>
        
        <form class="space-y-4">
             <div>
                <label for="new-post-community-select" class="block text-sm font-medium text-gray-700">Community</label>
                <select id="new-post-community-select" required class="mt-1 block w-full p-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">Select or type a community...</option>
                    </select>
                <p class="text-xs text-gray-500 mt-1">If the community does not exist, it will be created.</p>
            </div>

            <div>
                <label for="new-post-title" class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" id="new-post-title" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="A catchy title for your post">
            </div>

            <div>
                <label for="new-post-content" class="block text-sm font-medium text-gray-700">Content</label>
                <textarea id="new-post-content" rows="4" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Share your thoughts..."></textarea>
            </div>
            
            <button type="button" id="new-post-submit" class="w-full p-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700">Post</button>
        </form>
    </div>
</div>


<header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <h1 class="text-2xl font-bold text-gray-900">CampusRepublic</h1>
            <span class="text-sm text-gray-500 hidden sm:inline" id="auth-status">Please log in to participate.</span>
        </div>
        <div class="flex items-center space-x-3">
             <button id="post-cta-button" class="px-4 py-2 bg-red-500 text-white rounded-full font-semibold hover:bg-red-600 transition-colors hidden">
                + Post
            </button>
            <button id="login-button" class="px-4 py-2 bg-blue-500 text-white rounded-full font-semibold hover:bg-blue-600 transition-colors">
                Login / Sign Up
            </button>
            <button id="logout-button" class="px-4 py-2 bg-gray-500 text-white rounded-full font-semibold hover:bg-gray-600 transition-colors hidden">
                Logout
            </button>
        </div>
    </div>
</header>

<div class="main-content">
    
    <aside class="sidebar bg-white p-4 rounded-lg shadow-md sticky top-4 h-full">
        <h2 class="text-lg font-bold mb-3 border-b pb-2">Communities</h2>
        <ul id="community-list" class="community-list text-gray-700 space-y-1">
            <li class="p-2 text-center text-gray-500">Loading communities...</li>
        </ul>

        <h2 class="text-lg font-bold mb-3 mt-6 border-b pb-2">User Actions</h2>
        <div class="space-y-2">
            <button id="dark-mode-toggle" class="w-full p-2 bg-gray-200 rounded text-gray-800 font-semibold hover:bg-gray-300 transition-colors">
                Toggle Dark Mode
            </button>
        </div>
    </aside>

    <main class="feed">
        <div id="post-feed">
            <div class="text-center py-10 text-gray-500">
                <span id="loading-indicator" class="text-xl font-semibold">Loading posts...</span>
            </div>
        </div>
        <div id="load-more" class="text-center py-4">
            <button onclick="loadPosts(true)" class="px-6 py-2 bg-gray-300 text-gray-800 rounded-full font-semibold hover:bg-gray-400 transition-colors">
                Load More
            </button>
        </div>
    </main>

</div>
</body>
</html>
